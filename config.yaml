services:
  - name: "api-server"
    command: "python services/api.py"
    replicas: 3
    base_port: 8000
    health_url: "http://localhost:{port}/health"

  - name: "worker"
    command: "python services/worker.py"
    replicas: 2
    base_port: 9000
    health_url: "http://localhost:{port}/health"


